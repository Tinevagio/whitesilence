name: whitesilence
description: Ski de rando sans inscription, sans tracking, sans bruit. La seule trace, c'est celle dans la neige.
publish_to: 'none'
version: 0.1.0+9

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Carte & GPS
  flutter_map: ^7.0.0
  # Note : on n'utilise PLUS flutter_map_cancellable_tile_provider depuis
  # qu'on a notre CachedTileProvider maison (cache disque persistant).
  latlong2: ^0.9.1
  geolocator: ^12.0.0

  # Stockage local
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  shared_preferences: ^2.2.0

  # Module time (Phase 1) — calculs Munter + isochrones + HGT
  archive: ^3.4.0           # décompression .hgt.gz depuis AWS Skadi

  # Module conditions (Phase 3) — WebView qui charge le frontend HTML servi
  # par le backend Névé. Voir docs/PHASE3_TEST.md.
  webview_flutter: ^4.10.0

  # Module snow (Phase 2) — observations vocales + IA + partage
  flutter_dotenv: ^5.1.0     # gestion des clés API (.env)
  flutter_sound: ^9.0.0      # enregistrement audio
  just_audio: ^0.10.5        # lecture des bips de feedback
  permission_handler: ^11.0.0 # permission micro
  supabase_flutter: ^2.12.0  # partage anonyme des obs

  # Modules — seront activés au fil des phases
  # Phase 5 (tour) : gpx, share_plus
  # Phase 5 (wake-word ONNX) : code natif Android, pas de dep Dart

  # Outils
  http: ^1.2.0
  intl: ^0.20.0
  url_launcher: ^6.3.0    # ouvre URLs Camptocamp/Skitour depuis Idées

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_test:
    sdk: flutter
  # Si tu veux dart test pur sur les fichiers sans Flutter :
  test: ^1.24.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

# ─── Génération des icônes d'app ────────────────────────────────────────────
# Exécuter après modification :  flutter pub run flutter_launcher_icons
# Cela génère automatiquement toutes les tailles Android dans
# android/app/src/main/res/mipmap-* à partir des assets ci-dessous.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/icon_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F5F8FA"     # blanc cassé
  adaptive_icon_foreground: "assets/images/icon_adaptive_foreground.png"
